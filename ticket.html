<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon ticket — Scanbill</title>
<link rel="stylesheet" href="style.css">
<style>
  .ticket-page { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.25rem; }
  .ticket-wrap { width: 100%; max-width: 380px; }
  .t-wordmark { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; letter-spacing: -0.01em; color: var(--gray-400); margin-bottom: 1.5rem; }
  .t-concert { font-family: var(--mono); font-size: 1.1rem; font-weight: 500; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.2rem; }
  .t-date { font-size: 0.8rem; color: var(--gray-600); margin-bottom: 1.5rem; }
  .t-body { border: 1px solid var(--gray-200); }
  .t-qr { padding: 1.25rem; display: flex; justify-content: center; background: var(--gray-100); border-bottom: 1px solid var(--gray-200); }
  .t-qr svg { display: block; }
  .t-field { display: flex; justify-content: space-between; align-items: baseline; padding: 0.65rem 1rem; border-bottom: 1px solid var(--gray-200); }
  .t-field:last-child { border-bottom: none; }
  .t-lbl { font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-600); }
  .t-val { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; }
  .t-status-block { border-top: 2px solid var(--black); padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center; }
  .t-status-block.st-available { border-top-color: var(--black); }
  .t-status-block.st-sold { border-top-color: #854F0B; }
  .t-status-block.st-entered { border-top-color: #c00; }
  .t-status-lbl { font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-600); }
  .t-status-val { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; }
  .t-status-val.ok { color: var(--black); }
  .t-status-val.sold { color: #854F0B; }
  .t-status-val.entered { color: #c00; }
  .t-footer { margin-top: 1.25rem; font-size: 0.72rem; color: var(--gray-400); text-align: center; font-family: var(--mono); }
  .t-refreshing { font-size: 0.7rem; color: var(--gray-400); text-align: center; margin-top: 0.5rem; font-family: var(--mono); }
  .error-state { text-align: center; padding: 3rem 1rem; }
  .error-state .t-wordmark { font-size: 1rem; }
  .error-state p { font-family: var(--mono); font-size: 0.85rem; color: var(--gray-600); }
  .loading { text-align: center; padding: 3rem; font-family: var(--mono); font-size: 0.85rem; color: var(--gray-400); }
</style>
</head>
<body>
<div class="ticket-page">
  <div class="ticket-wrap">
    <div id="state-loading" class="loading">chargement...</div>
    <div id="state-error" class="error-state" style="display:none">
      <div class="t-wordmark">Scanbill</div>
      <p id="error-msg">Ticket introuvable.</p>
    </div>
    <div id="state-ticket" style="display:none">
      <div class="t-wordmark">Scanbill</div>
      <div class="t-concert" id="t-concert"></div>
      <div class="t-date" id="t-date"></div>
      <div class="t-body">
        <div class="t-qr" id="t-qr"></div>
        <div class="t-field"><span class="t-lbl">N° ticket</span><span class="t-val" id="t-num"></span></div>
        <div class="t-field"><span class="t-lbl">Tarif</span><span class="t-val" id="t-price"></span></div>
        <div class="t-field"><span class="t-lbl">Mode</span><span class="t-val" id="t-mode"></span></div>
        <div class="t-status-block" id="t-status-block">
          <span class="t-status-lbl">Statut</span>
          <span class="t-status-val" id="t-status-val"></span>
        </div>
      </div>
      <div class="t-footer" id="t-footer">Présentez ce ticket à l'entrée</div>
      <div class="t-refreshing" id="t-refreshing"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="qr.js"></script>
<script>
var SUPABASE_URL = 'https://xudwrqowcnqsggiizmhw.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1ZHdycW93Y25xc2dnaWl6bWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NTcyNjUsImV4cCI6MjA5NzEzMzI2NX0.qFJKOM4PAJHrjPqTHNwmwKW6ks1rgwH40LF1RyXrRE0';
var SITE_URL = 'https://scanbill-ivory.vercel.app';

function gp(name) {
  var m = window.location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
  return m ? decodeURIComponent(m[1].replace(/\+/g,' ')) : null;
}

// Normalize a time value (DB gives "HH:MM:SS", params give "HH:MM") → "HH:MM"
function normTime(t) { return t ? String(t).slice(0, 5) : '00:00'; }

function activePrice(presale, door, dateStr, timeStr) {
  if (!dateStr) return { price: presale, mode: 'prévente' };
  var now = new Date();
  var sw = new Date(dateStr + 'T' + normTime(timeStr) + ':00');
  if (isNaN(sw.getTime())) return { price: presale, mode: 'prévente' };
  return now >= sw ? { price: door, mode: 'jour J' } : { price: presale, mode: 'prévente' };
}

function fmtDate(dateStr, timeStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T' + normTime(timeStr) + ':00');
  if (isNaN(d.getTime())) return dateStr; // fall back to raw date, never "Invalid Date"
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function renderStatic(id, concert, presale, door, currency, dateStr, timeStr) {
  document.getElementById('t-concert').textContent = concert;
  document.getElementById('t-date').textContent = fmtDate(dateStr, timeStr);
  document.getElementById('t-num').textContent = id;
  var ap = activePrice(presale, door, dateStr, timeStr);
  document.getElementById('t-price').textContent = Number(ap.price).toLocaleString() + ' ' + currency;
  document.getElementById('t-mode').textContent = ap.mode;
  var qrPayload = window.location.href;
  document.getElementById('t-qr').innerHTML = window.makeQRSVG(qrPayload, 200);
  document.title = id + ' — Scanbill';
}

function applyStatus(status, soldTime, entryTime) {
  var block = document.getElementById('t-status-block');
  var val = document.getElementById('t-status-val');
  var footer = document.getElementById('t-footer');
  block.className = 't-status-block st-' + (status || 'available');
  if (status === 'entered') {
    val.className = 't-status-val entered';
    val.textContent = 'utilisé · ' + (entryTime || '');
    footer.textContent = 'Ce ticket a déjà été utilisé.';
  } else if (status === 'sold') {
    val.className = 't-status-val sold';
    val.textContent = 'vendu · ' + (soldTime || '');
    footer.textContent = 'Présentez ce ticket à l\'entrée.';
  } else {
    val.className = 't-status-val ok';
    val.textContent = 'valide';
    footer.textContent = 'Présentez ce ticket à l\'entrée.';
  }
}

function renderFromData(d) {
  renderStatic(d.id, d.concert, d.presale, d.door, d.currency, d.concert_date, d.concert_time);
  applyStatus(d.status || 'available', d.sold_time, d.entry_time);
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-ticket').style.display = 'block';
}

async function fetchTicket(id, sb) {
  try {
    var res = await sb.from('tickets')
      .select('id,concert,presale,door,currency,concert_date,concert_time,status,sold_time,entry_time')
      .eq('id', id).single();
    return res.data || null;
  } catch (e) { return null; }
}

(async function load() {
  var id = (gp('id') || '').toUpperCase();
  if (!id) { showError('Aucun identifiant de ticket fourni.'); return; }

  // Fallback: old QR codes that still carry full data in the URL
  var fromParams = {
    id: id, concert: gp('c') || '', presale: parseFloat(gp('p')) || 0,
    door: parseFloat(gp('d')) || 0, currency: gp('cur') || '',
    concert_date: gp('dt') || '', concert_time: gp('tm') || '',
    status: 'available', sold_time: null, entry_time: null
  };
  if (fromParams.concert) renderFromData(fromParams); // instant render if params present

  if (!(SUPABASE_URL && SUPABASE_ANON_KEY)) {
    if (!fromParams.concert) showError('QR code invalide — données manquantes.');
    return;
  }

  document.getElementById('t-refreshing').textContent = 'Chargement...';
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  s.onload = async function() {
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    var row = await fetchTicket(id, sb);
    if (row) renderFromData(row);          // authoritative data from DB
    else if (!fromParams.concert) showError('Ticket introuvable.');
    document.getElementById('t-refreshing').textContent = '';
  };
  s.onerror = function() {
    if (!fromParams.concert) showError('Erreur de chargement. Vérifiez votre connexion.');
    document.getElementById('t-refreshing').textContent = '';
  };
  document.head.appendChild(s);
})();

function showError(msg) {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('state-error').style.display = 'block';
}
</script>
</body>
</html>
